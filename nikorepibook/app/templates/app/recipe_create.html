{% extends "app/base.html" %}

{% block content %}

<div class="app">

  <header class="header">
    <h1>レシピ登録</h1>
  </header>

  <form method="POST">
    {% csrf_token %}
  
  <section class="recipe-form">

    <label>タイトル</label>
    <input type="text"
           name="title"
           placeholder="例）シンプルオムライス">

    <div class="serving-row">
      <span>何人分？</span>

      <select name = "servings">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
      </select>

      <span>人分</span>
    </div>

    <h2>材料</h2>
    <div id="ingredient-list">

      <div class="ingredient-item">
        <input type="text" name="ingredient_name"
        placeholder="材料名">
        <input type="text"  name="ingredient_amount"
        placeholder="分量">

        <input type="checkbox">
      </div>

      <div class="ingredient-item">
        <input type="text" name="ingredient_name"
        placeholder="材料名">
        <input type="text"  name="ingredient_amount"
        placeholder="分量">
      
        <input type="checkbox">
      </div>

    </div>

    <button type="button" id="add-ingredient-button">
    ＋材料を追加
    </button>

    <label>参考URL</label>
    <input type="url" name="reference_url"
    placeholder="https://example.com">

    <label>メモ</label>

    <textarea
      name="memo"
      rows="5"
      placeholder="作り方メモ"
    ></textarea>

    <button type="submit" class="save-button">
      レシピを保存
    </button>

  </section>

</form>

</div>

<script>
document.getElementById("add-ingredient-button").addEventListener("click", function() {

    const ingredientList = document.getElementById("ingredient-list");

    const newIngredient = document.createElement("div");

    newIngredient.className = "ingredient-item";

    newIngredient.innerHTML = `
        <input type="text" name="ingredient_name" placeholder="材料名">

        <input type="text" name="ingredient_amount" placeholder="分量">

        <input type="checkbox">
    `;

    ingredientList.appendChild(newIngredient);

});
</script>

{% endblock %}
