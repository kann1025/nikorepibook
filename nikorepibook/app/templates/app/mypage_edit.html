{% extends "app/base.html" %}

{% block content %}

<div class="app">

  <header class="header">
    <h1>マイページ編集</h1>
  </header>

  <section class="mypage-edit-section">

    

    <form
      method="post"
      enctype="multipart/form-data"
      id="mypage-edit-form"
    >
        {% csrf_token %}

        <label>プロフィール画像</label>

        <label class="profile-image-upload">
          <input type="file" name="image" id="profile-image-input">

          {% if profile.image %}
            <img
              id="profile-image-preview"
              src="{{ profile.image.url }}"
              alt="プロフィール画像"
            >
            <span id="profile-image-text" style="display: none;">画像を選択</span>
          {% else %}
           <img
             id="profile-image-preview"
             src=""
             alt="プロフィール画像プレビュー"
           >
           <span id="profile-image-text">画像を選択</span>
          
          {% endif %}
        </label>




        <label>ニックネーム</label>
        <input
        type="text"
        value="{{ request.user.username }}"
        readonly
        >

        <label>大人</label>
        <select name="adult_count">
            <option value="1" {% if profile.adult_count == 1 %}selected{% endif %}>1</option>
            <option value="2" {% if profile.adult_count == 2 %}selected{% endif %}>2</option>
            <option value="3" {% if profile.adult_count == 3 %}selected{% endif %}>3</option>
            <option value="4" {% if profile.adult_count == 4 %}selected{% endif %}>4</option>
        </select>

        <label>こども</label>
        <select name="child_count">
            <option value="0" {% if profile.child_count == 0 %}selected{% endif %}>0</option>
            <option value="1" {% if profile.child_count == 1 %}selected{% endif %}>1</option>
            <option value="2" {% if profile.child_count == 2 %}selected{% endif %}>2</option>
            <option value="3" {% if profile.child_count == 3 %}selected{% endif %}>3</option>
            <option value="4" {% if profile.child_count == 4 %}selected{% endif %}>4</option>
        </select>

        <button
          type="submit"
          class="save-button"
          id="mypage-edit-button"
        >
          保存
        </button>

    </from>

  </section>

</div>
<script>
  const profileImageInput = document.getElementById('profile-image-input');
  const profileImagePreview = document.getElementById('profile-image-preview');
  const profileImageText = document.getElementById('profile-image-text');

  profileImageInput.addEventListener('change', function() {
    const file = this.files[0];

    if (file) {
      profileImagePreview.src = URL.createObjectURL(file);
      profileImagePreview.style.display = 'block';
      profileImageText.style.display = 'none';
    }
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("mypage-edit-form");
    const submitButton = document.getElementById("mypage-edit-button");

    if (form && submitButton) {
      form.addEventListener("submit", function () {
        submitButton.disabled = true;
        submitButton.textContent = "保存中...";
      });
    }
  });
</script>

{% endblock %}
