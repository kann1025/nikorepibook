{% extends "app/base.html" %}

{% block content %}

<div class="app">

  <header class="header">
    <h1>レシピ詳細</h1>
  </header>

  <section>

    <div class="recipe-image">
      🍳
    </div>

    <h2>{{ recipe.title }}</h2>

    <button class="add-button">
      献立に追加
    </button>

    <a href="{% url 'recipe_edit' recipe.id %}" class="add-button">
    レシピを編集
    </a>

    <h2>材料</h2>

    <p>{{ recipe.ingredients|linebreaksbr }}</p>

  

    <h2>参考URL</h2>

    <p class="recipe-url">
        {{ recipe.reference_url }}
    </p>

    <h2>メモ</h2>

    <div class="memo-box">
       {{ recipe.memo|linebreaksbr}} 
    </div>


  </section>

</div>

{% endblock %}
