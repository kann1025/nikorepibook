<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>



  {% block content %}
  {% endblock %}

 {% if user.is_authenticated and request.resolver_match.url_name != "portfolio" and request.resolver_match.url_name != "login" and request.resolver_match.url_name != "signup" %}
  <nav class="bottom-nav">
    <a href="{% url 'home' %}">🏠<br>ホーム</a>
    <a href="{% url 'shopping_list' %}">🛒<br>買い物リスト</a>
    <a href="{% url 'calendar' %}">🗓️<br>献立表</a>
    <a href="{% url 'mypage' %}">👤<br>マイページ</a>
    <a href="#" class="logout-open-button" id="logout-open-button">
      ↪<br>ログアウト
    </a>
  </nav>

  <div class="logout-modal" id="logout-modal">
   <div class="logout-modal-content">
    <p>ログアウトしますか？</p>

    <div class="logout-modal-buttons">
      <button type="button" id="logout-cancel-button">
        キャンセル
      </button>

      <a href="/logout/" class="logout-confirm-button">
        ログアウト
      </a>
    </div>
   </div>
  </div>

  {% endif %}
    
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const openButton = document.getElementById("logout-open-button");
    const modal = document.getElementById("logout-modal");
    const cancelButton = document.getElementById("logout-cancel-button");

    if (openButton && modal && cancelButton) {
      openButton.addEventListener("click", function (event) {
        event.preventDefault();
        modal.classList.add("is-open");
      });

      cancelButton.addEventListener("click", function () {
        modal.classList.remove("is-open");
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          modal.classList.remove("is-open");
        }
      });
    }
  });
</script>



</body>
</html>
