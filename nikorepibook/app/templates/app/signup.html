{% extends "app/base.html" %}

{% block content %}


  <div class="app-container">
    <h2>新規登録画面</h2>

    <form action="" method="post" enctype="multipart/form-data" autocomplete="off">
      {% csrf_token %}

      <label>プロフィール画像</label>
      

      <label class="profile-image">
        <input type="file" name="image" id="signup-profile-image-input">
        <span id="signup-profile-image-text">＋</span>
        <img
          id="signup-profile-image-preview"
          src=""
          alt=""
        >
      </label>

      <p class="profile-image-caption">プロフィール画像を追加</p>


      {% if error %}
        <p class="error-message">{{ error }}</p>
      {% endif %}

      {% if password_errors %}
        <div class="error-message">
          {% for password_error in password_errors %}
            <p>{{ password_error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <label>ニックネーム</label>
      <input 
        type="text"
        name="username"
        placeholder="かな"
        required
        autocomplete="off"
      >

      <p>家族構成</p>

      <label>大人</label>
      <div class="count-row">
        <select name="adult_count">
          <option>1</option>
          <option selected>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6</option>
          <option>7</option>
        </select>
        <span>人</span>
      </div>

      <label>こども</label>
      <div class="count-row">
        <select name="child_count">
          <option>0</option>
          <option>1</option>
          <option selected>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6</option>
        </select>
        <span>人</span>

      </div>

      <label>メールアドレス</label>
      <input
        type="email"
        name="email"
        placeholder="例）abcdefg@cook.com"
        required
        autocomplete="off"
      >

      <label>パスワード</label>
      <input
        type="password"
        name="password"
        required
        autocomplete="new-password"
      >

      <label>パスワード（確認用）</label>
      <input
        type="password"
        name="password_confirm"
        required
        autocomplete="new-password"
      >

      <button type="submit">アカウントを登録する</button>
    </form>
  </div>

  <script>
    const signupProfileImageInput = document.getElementById('signup-profile-image-input');
    const signupProfileImagePreview = document.getElementById('signup-profile-image-preview');
    const signupProfileImageUpload = document.querySelector('.profile-image');

    signupProfileImageInput.addEventListener('change',function(){
      const file = this.files[0];

      if (file) {
        signupProfileImagePreview.src = URL.createObjectURL(file);
        signupProfileImageUpload.classList.add('has-image');
      }
    });

  </script>

  {% endblock %}
