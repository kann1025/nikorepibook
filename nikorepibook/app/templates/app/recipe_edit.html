{% extends 'app/base.html' %}

{% block content %}

<div class="app">

    <header class="header">
        <h1>レシピ編集</h1>
    </header>

    <section>
        <form method="post">
            {% csrf_token %}

            <p>
                タイトル<br>
                <input type="text" name="title" value="{{ recipe.title }}" class="form-input">
            </p>

            <p>
                人数<br>
                <input type="number" name="servings" value="{{ recipe.servings }}" class="form-input">
            </p>

            <p>
                材料<br>
                
                {% for ingredient in ingredients %}
         
                    <div class="ingredient-item">
                        <input type="hidden" name="ingredient_id" value="{{ ingredient.id }}">
                        <input type="text" name="ingredient_name" value="{{ ingredient.name }}" placeholder="材料名">
                        <input type="text" name="ingredient_amount" value="{{ ingredient.amount }}" placeholder="分量">

                        <input type="checkbox">

                    </div>
                {% endfor %}
               
            </p>

            <p>
                参考URL<br>
                <input type="url" name="reference_url" value="{{ recipe.reference_url }}" class="form-input">
            </p>

            <p>
                メモ<br>
                <textarea name="memo" rows="5" class="form-input">{{ recipe.memo }}</textarea>
            </p>

            <button type="submit" class="add-button">保存する</button>
        </form>
    </section>

</div>

{% endblock %}
