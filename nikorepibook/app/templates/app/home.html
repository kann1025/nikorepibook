{% extends "app/base.html" %}

{% block content %}

<div class="app">
  <header class="header">
    <h1>にこれぴbook</h1>
    <p>レシピ一覧</p>
  </header>

  <div class="search-box">
    <input type="text" placeholder="食材・レシピ名で検索">
    <button>🔍</button>
  </div>

  <a href="/recipe_create/" class="add-button">＋ レシピの追加</a>

  <section class="ingredients">
    <h2>冷蔵庫にある食材</h2>
    <div class="tags">
      <span>卵</span>
      <span>キャベツ</span>
      <span>にんじん</span>
      <span>玉ねぎ</span>
      <span>なす</span>
      <span>鶏肉</span>
    </div>
  </section>

  <section class="recipes">
    <h2>レシピ一覧</h2>

    <div class="recipe-list">
      {% for recipe in recipes %}
         <a href="{% url 'recipe_detail' recipe.id %}" class="recipe-card">
            <div class="recipe-image">🍳</div>
            <p>{{ recipe.title }}</p>
         </a>

      {% endfor %}

    </div>
  </section>

</div>

{% endblock %}
