{% extends "app/base.html" %}

{% block content %}

<div class="app">
  <header class="header">
    <h1>買い物リスト</h1>
  </header>

  <section class="shopping-section">
    <p class="section-label">期間を選択</p>

    <div class="date-range">
      <input type="date" value="2026-03-10">
      <span>〜</span>
      <input type="date" value="2026-03-15">
    </div>

    <div class="selected-recipes">
      <div class="small-recipe-image">🍳</div>
    </div>

    <ul class="shopping-list">
      <li>
        <input type="checkbox">
        <span>卵</span>
        <span class="amount">2個</span>
      </li>

      <li class="checked-item">
        <input type="checkbox" checked>
        <span>鶏肉</span>
        <span class="amount">150g</span>
      </li>

      <li>
        <input type="checkbox">
        <span>玉ねぎ</span>
        <span class="amount">1/4個</span>
      </li>

      <li>
        <input type="checkbox">
        <span>人参</span>
        <span class="amount">50g</span>
      </li>
    </ul>
  </section>
</div>

{% endblock %}
