{% extends "app/base.html" %}

{% block content %}

<div class="app">
  <header class="header">
    <h1>買い物リスト</h1>
  </header>

  <section class="shopping-section">
    <p class="section-label">期間を選択</p>

    <div class="date-range">
      <input type="date" value="2026-03-10">
      <span>〜</span>
      <input type="date" value="2026-03-15">
    </div>

    <div class="selected-recipes">
      <div class="small-recipe-image">🍳</div>
    </div>

    <ul class="shopping-list">

      {% for item in shopping_items %}

      <li>
        <input type="checkbox">

        <span>{{ item.name }}</span>

        <span class="amount">
          {{ item.quantity }}{{ item.unit }}
        </span>
      </li>

      {% empty %}

      <li>
        買い物リストはありません
      </li>

      {% endfor %}

    
    </ul>
  </section>
</div>

{% endblock %}
