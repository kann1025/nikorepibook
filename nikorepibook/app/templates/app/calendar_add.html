{% extends "app/base.html" %}

{% block content %}

<div class="app">

  <header class="header">
    <h1>献立追加</h1>
  </header>

  <section>



      <h2>レシピを選択</h2>

    <form method="GET" class="calendar-search-form">

         <input
           type="hidden"
           name="date"
           value="{{ planned_date }}"
         > 

         <input
           type="text"
           name="keyword"
           value="{{ keyword }}"
           placeholder="レシピ検索"
           class="calendar-add-search"
         >
    </form>

    <form method="POST">
      {% csrf_token %}

      <div class="calendar-date-box">
        <label>追加する日付</label>
        <input
          type="date"
          name="planned_date"
          value="{{ planned_date }}"
          class="calendar-date-input"
        >
      </div>


      <div class="calendar-recipe-list">

        {% for recipe in recipes %}

         <div class="calendar-recipe-item">

          <input
             type="checkbox"
             name="recipe_ids"
             value="{{ recipe.id }}"
             {% if recipe.id in selected_recipe_ids or selected_recipe_id == recipe.id|stringformat:"s" %}
                  checked
             {% endif %}
          >

          <a 
             href="{% url 'recipe_detail' recipe.id %}"
             class="recipe-link"
          >
            <div class="recipe-image">
                {% if recipe.image %}
                   <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">  
                {% else %}
                    <span class="no-image">🍳</span>
                {% endif %}
            </div>
            
            <p>{{ recipe.title }}</p>
          </a>
        </div>

        {% empty %}

           <p>レシピがありません</p>

        {% endfor %}

     
      </div>

      <button type="submit" class="calendar-add-button">
      追加
      </button>

    </form>
  </section>

</div>

{% endblock %}
